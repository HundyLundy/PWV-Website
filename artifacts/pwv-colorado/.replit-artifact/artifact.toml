kind = "web"
previewPath = "/locations/"
title = "Perfect Water Valve — Colorado Landing Page"
version = "1.0.0"
id = "artifacts/pwv-colorado"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/locations/" ]
localPort = 21781

[services.development]
run = "pnpm --filter @workspace/pwv-colorado run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pwv-colorado", "run", "build" ]
publicDir = "artifacts/pwv-colorado/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21781"
BASE_PATH = "/locations/"
