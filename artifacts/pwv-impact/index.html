    <!-- FAQPage schema -->
    <script type="application/ld+json">{
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How is the live water savings counter calculated?",
          "acceptedAnswer": {"@type": "Answer", "text": "The counter is based on a verified 19.2% average reduction in metered water consumption across a one-year sample of Smart Valve™ installations. Using the combined baseline water usage of participating sites and the elapsed time since January 1, the counter shows the estimated cumulative volume of water no longer billed as phantom metered usage."}
        },
        {
          "@type": "Question",
          "name": "What is the total water saved by Perfect Water Valve installations?",
          "acceptedAnswer": {"@type": "Answer", "text": "Based on a one-year sample of a small percentage of 32,000+ installations, Smart Valve™ technology conserves an estimated 36.8 billion gallons of metered water annually across the installation base. This figure represents air volume no longer billed as water — not water physically removed from consumption."}
        },
        {
          "@type": "Question",
          "name": "What does 'metered water savings' mean versus actual water saved?",
          "acceptedAnswer": {"@type": "Answer", "text": "Metered water savings refers to the reduction in volume registered by a water meter after Smart Valve™ installation. Before installation, entrapped air in the supply line registers as water volume and is billed accordingly. After installation, only actual water passes the meter. The 'savings' is the elimination of that phantom air volume from the bill — actual water consumption does not change."}
        },
        {
          "@type": "Question",
          "name": "Which industries have the highest Smart Valve savings?",
          "acceptedAnswer": {"@type": "Answer", "text": "Across verified M&V data, luxury hospitality leads with 20%–58% reduction (including a 58.69% peak at Amazon). Automotive (car wash) averages 23%, real estate and multifamily averages 19%–22%, healthcare and labs average 20%, and logistics/warehousing averages 17%. Every industry shows a minimum guaranteed 15%."}
        },
        {
          "@type": "Question",
          "name": "What is Measurement and Verification (M&V) and why does it matter?",
          "acceptedAnswer": {"@type": "Answer", "text": "Measurement and Verification (M&V) is a structured, third-party process for quantifying the savings achieved by an energy or water conservation measure. It compares metered consumption before and after installation while controlling for variables such as occupancy and seasonal demand. M&V is the industry standard for confirming that savings are real and attributable to the intervention — not coincidental. All Perfect Water Valve case study figures are M&V-verified."}
        }
      ]
    }</script>
