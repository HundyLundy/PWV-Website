kind = "web"
previewPath = "/legacy-impact/"
title = "Perfect Water Valve — Live Impact Counter"
version = "1.0.0"
id = "artifacts/pwv-impact"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/legacy-impact/" ]
localPort = 25854

[services.development]
run = "pnpm --filter @workspace/pwv-impact run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pwv-impact", "run", "build" ]
publicDir = "artifacts/pwv-impact/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25854"
BASE_PATH = "/legacy-impact/"
