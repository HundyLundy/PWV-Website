    <!-- HowTo: How the Smart Valve works -->

    <!-- FAQPage -->
    <script type="application/ld+json">{
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is air entrapment in commercial water systems?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Air entrapment occurs when pressurized municipal water pushes trapped air pockets through supply lines into a building's plumbing. Standard water meters cannot distinguish air from water, so those air pockets are billed as metered volume. Studies indicate that 15%–40% of a typical commercial building's water bill may represent air rather than actual water consumed."
          }
        },
        {
          "@type": "Question",
          "name": "How does the Smart Valve™ reduce a commercial water bill?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The Smart Valve™ installs between the municipal main and the water meter. It passively releases air from the pressurized supply line before that air reaches the meter. Only actual water volume is then counted — resulting in 15% to 58% lower metered readings with no change in actual water usage."
          }
        },
        {
          "@type": "Question",
          "name": "Is the 15% minimum savings really guaranteed in writing?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Every Smart Valve™ installation includes a written contract guaranteeing a minimum 15% reduction in metered water consumption. If the facility does not achieve 15% savings, Perfect Water Valve makes it right at no additional cost."
          }
        },
        {
          "@type": "Question",
          "name": "What is Measurement and Verification (M&V) in water savings?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Measurement and Verification (M&V) is a third-party process that compares a facility's water billing before and after a conservation intervention, controlling for occupancy, season, and other variables. M&V is the industry standard for confirming that reported savings are real, not coincidental. All Perfect Water Valve case study results are independently M&V-verified."
          }
        },
        {
          "@type": "Question",
          "name": "Is the Smart Valve™ the same as a check valve or pressure reducer?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Check valves prevent backflow; pressure reducers lower line pressure. Neither addresses air entrapment or reduces metered billing. The Smart Valve™ is a purpose-built air elimination device that targets the specific mechanism — entrapped air registering as volume on your meter — that inflates commercial water bills."
          }
        },
        {
          "@type": "Question",
          "name": "Does the Smart Valve™ require electricity or ongoing maintenance?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. The Smart Valve™ is entirely passive. It has no moving parts, requires no electricity, no software, and no service contracts. It is NSF 61 and NSF 372 certified for drinking water system components."
          }
        },
        {
          "@type": "Question",
          "name": "What types of commercial facilities benefit most?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Any commercial or industrial facility billed on metered municipal water can benefit. Verified results span luxury hospitality (Four Seasons, St. Regis), logistics and fulfillment (Amazon), real estate and multifamily (Houstonian Estates, Grand Central at Kennedy), and automotive (Caliber Car Wash). Higher monthly water bills produce larger absolute savings."
          }
        }
      ]
    }</script>
