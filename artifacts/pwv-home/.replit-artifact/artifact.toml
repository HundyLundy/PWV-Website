kind = "web"
previewPath = "/"
title = "Perfect Water Valve — Official Website"
version = "1.0.0"
id = "artifacts/pwv-home"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22335

[services.development]
run = "pnpm --filter @workspace/pwv-home run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pwv-home", "run", "build" ]
publicDir = "artifacts/pwv-home/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22335"
BASE_PATH = "/"
