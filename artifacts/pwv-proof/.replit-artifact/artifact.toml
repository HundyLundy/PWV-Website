kind = "web"
previewPath = "/pwv-proof/"
title = "Perfect Water Valve — Proof Story"
version = "1.0.0"
id = "artifacts/pwv-proof"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/pwv-proof/" ]
localPort = 20144

[services.development]
run = "pnpm --filter @workspace/pwv-proof run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pwv-proof", "run", "build" ]
publicDir = "artifacts/pwv-proof/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20144"
BASE_PATH = "/pwv-proof/"
