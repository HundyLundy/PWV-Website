    <!-- HowTo schema -->
    <script type="application/ld+json">{
      "@context": "https://schema.org",
      "@type": "HowTo",
      "name": "How to Reduce Your Commercial Water Bill with the Smart Valve™",
      "description": "The Smart Valve™ removes entrapped air from pressurized municipal water lines before the air reaches your meter, eliminating phantom metered volume.",
      "step": [
        {"@type": "HowToStep", "position": 1, "name": "Schedule a Free Site Assessment", "text": "Contact Perfect Water Valve. A specialist reviews your billing history, meter configuration, and supply pressure profile."},
        {"@type": "HowToStep", "position": 2, "name": "Installation", "text": "The Smart Valve™ is installed at the main shutoff — between the street and your meter. No permit required in most jurisdictions. Typically 1–2 hours."},
        {"@type": "HowToStep", "position": 3, "name": "Immediate Air Elimination", "text": "On first pressurization, the valve begins releasing entrapped air before it reaches the meter. No configuration required."},
        {"@type": "HowToStep", "position": 4, "name": "Verify Savings on Your Bill", "text": "Most clients see measurable reduction on their next billing cycle. M&V reporting confirms savings against baseline and satisfies the written guarantee."}

    <!-- FAQPage schema -->
    <script type="application/ld+json">{
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How does the Smart Valve™ reduce my water bill?",
          "acceptedAnswer": {"@type": "Answer", "text": "Municipal water systems trap air bubbles that register as volume on your meter. The Smart Valve™ installs upstream and purges that air before it is counted. Your meter reads only actual water — typically 15% to 58% less than before."}
        },
        {
          "@type": "Question",
          "name": "Is the 15% savings really guaranteed?",
          "acceptedAnswer": {"@type": "Answer", "text": "Yes. The guarantee is in writing in your contract. If your facility does not achieve at least 15% reduction in metered water consumption, Perfect Water Valve makes it right at no additional cost."}
        },
        {
          "@type": "Question",
          "name": "What is air entrapment and why does it inflate water bills?",
          "acceptedAnswer": {"@type": "Answer", "text": "Air entrapment is the phenomenon where pressurized municipal supply lines push trapped air pockets into a building's plumbing. Water meters measure volume indiscriminately — air and water register identically. Facilities may be billed for 15%–40% air rather than water without knowing it."}
        },
        {
          "@type": "Question",
          "name": "Does the Smart Valve need electricity or maintenance?",
          "acceptedAnswer": {"@type": "Answer", "text": "No. The Smart Valve™ is entirely passive — no electricity, no moving parts, no subscriptions or service visits. It is NSF 61 and NSF 372 certified."}
        },
        {
          "@type": "Question",
          "name": "What certifications does the Smart Valve have?",
          "acceptedAnswer": {"@type": "Answer", "text": "NSF 61 and NSF 372 certified — the gold standard for drinking water system components in the United States and Canada. NSF 372 specifically confirms lead-free materials."}
        },
        {
          "@type": "Question",
          "name": "How is the Smart Valve different from a check valve or pressure regulator?",
          "acceptedAnswer": {"@type": "Answer", "text": "Check valves prevent backflow. Pressure regulators reduce line pressure. Neither addresses air entrapment or reduces metered billing. The Smart Valve™ is purpose-built to eliminate the air that inflates your meter reading."}
        }
      ]
    }</script>
