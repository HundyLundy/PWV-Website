openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Perfect Water Valve Sales Dashboard API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: data
    description: Dashboard data endpoints
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /data/summary:
    get:
      operationId: getSummary
      tags: [data]
      summary: Get dashboard KPI summary
      responses:
        "200":
          description: Summary KPIs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SummaryData"
  /data/quarterly:
    get:
      operationId: getQuarterlySavings
      tags: [data]
      summary: Get quarterly savings by site
      responses:
        "200":
          description: Quarterly savings data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QuarterlySaving"
  /data/water-usage:
    get:
      operationId: getWaterUsage
      tags: [data]
      summary: Get monthly water usage comparison
      responses:
        "200":
          description: Water usage comparison
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WaterUsageEntry"
  /data/sites:
    get:
      operationId: getSites
      tags: [data]
      summary: Get site details
      responses:
        "200":
          description: Site details
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SiteDetail"
  /data/cost-savings:
    get:
      operationId: getCostSavings
      tags: [data]
      summary: Get projected cost savings
      responses:
        "200":
          description: Cost savings projections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CostSavingProjection"
  /data/customers:
    get:
      operationId: getCustomers
      tags: [data]
      summary: Get customer portfolio
      description: Returns all customer case studies across industries
      responses:
        "200":
          description: Customer portfolio
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CustomerCase"
  /data/carwash-sites:
    get:
      operationId: getCarwashSites
      tags: [data]
      summary: Get Caliber Car Wash site breakdown
      description: Returns per-site M&V results for the Caliber Car Wash portfolio
      responses:
        "200":
          description: Carwash site data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CarwashSite"
  /data/industry-comparison:
    get:
      operationId: getIndustryComparison
      tags: [data]
      summary: Get savings by industry
      description: Returns average savings percentage and water usage benchmarks by industry type
      responses:
        "200":
          description: Industry comparison data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IndustryComparison"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    SummaryData:
      type: object
      properties:
        portfolioAvgSavings:
          type: number
        guaranteedMinSavings:
          type: number
        yzz3AvgSavings:
          type: number
        yzz4AvgSavings:
          type: number
        yzz3PeakMonthlyUsageBefore:
          type: number
        yzz3PeakMonthlyUsageAfter:
          type: number
        yzz4PeakMonthlyUsageBefore:
          type: number
        yzz4PeakMonthlyUsageAfter:
          type: number
        gpmReductionYzz3:
          type: number
        costPerCubicMeter:
          type: number
        totalCustomers:
          type: integer
        totalIndustriesServed:
          type: integer
      required:
        - portfolioAvgSavings
        - guaranteedMinSavings
        - yzz3AvgSavings
        - yzz4AvgSavings
        - yzz3PeakMonthlyUsageBefore
        - yzz3PeakMonthlyUsageAfter
        - yzz4PeakMonthlyUsageBefore
        - yzz4PeakMonthlyUsageAfter
        - gpmReductionYzz3
        - costPerCubicMeter
        - totalCustomers
        - totalIndustriesServed
    QuarterlySaving:
      type: object
      properties:
        period:
          type: string
        yzz3:
          type: number
        yzz4:
          type: number
      required:
        - period
        - yzz3
        - yzz4
    WaterUsageEntry:
      type: object
      properties:
        site:
          type: string
        period:
          type: string
        usageBefore:
          type: number
        usageAfter:
          type: number
        savingsM3:
          type: number
        savingsPct:
          type: number
      required:
        - site
        - period
        - usageBefore
        - usageAfter
        - savingsM3
        - savingsPct
    SiteDetail:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        address:
          type: string
        installDate:
          type: string
        avgSavings:
          type: number
        totalQuarters:
          type: integer
        quartersWithSavings:
          type: integer
        peakSavings:
          type: number
        avgGpmBefore:
          type: number
        avgGpmAfter:
          type: number
        status:
          type: string
          enum: [active, reinstalled]
      required:
        - id
        - name
        - address
        - installDate
        - avgSavings
        - totalQuarters
        - quartersWithSavings
        - peakSavings
        - avgGpmBefore
        - avgGpmAfter
        - status
    CostSavingProjection:
      type: object
      properties:
        facilityType:
          type: string
        monthlyUsageM3:
          type: number
        annualSavingsAtMin:
          type: number
        annualSavingsAtAvg:
          type: number
        annualWaterSavedM3:
          type: number
        paybackMonths:
          type: number
      required:
        - facilityType
        - monthlyUsageM3
        - annualSavingsAtMin
        - annualSavingsAtAvg
        - annualWaterSavedM3
        - paybackMonths
    CustomerCase:
      type: object
      properties:
        id:
          type: string
        clientName:
          type: string
        industry:
          type: string
          enum: [logistics, hospitality, commercial, industrial, retail, municipal, automotive]
        location:
          type: string
        installDate:
          type: string
        avgSavingsPct:
          type: number
        peakSavingsPct:
          type: number
        monthlyUsageM3:
          type: number
        annualWaterSavedM3:
          type: number
        annualCostSaved:
          type: number
        status:
          type: string
          enum: [verified, projected, active]
        highlight:
          type: string
          description: A one-line headline about this customer's results
        logoLetter:
          type: string
          description: Single letter for avatar display
      required:
        - id
        - clientName
        - industry
        - location
        - installDate
        - avgSavingsPct
        - peakSavingsPct
        - monthlyUsageM3
        - annualWaterSavedM3
        - annualCostSaved
        - status
        - highlight
        - logoLetter
    CarwashSite:
      type: object
      properties:
        id:
          type: string
        siteName:
          type: string
        address:
          type: string
        installDate:
          type: string
        savingsPct:
          type: number
          description: Average savings percentage from M&V analysis
        monthlyUsageBeforeM3:
          type: number
        monthlyUsageAfterM3:
          type: number
        annualWaterSavedM3:
          type: number
        annualCostSaved:
          type: number
        status:
          type: string
          enum: [verified, active, limited-data]
        note:
          type: string
          description: M&V analyst note about this site
      required:
        - id
        - siteName
        - address
        - installDate
        - savingsPct
        - monthlyUsageBeforeM3
        - monthlyUsageAfterM3
        - annualWaterSavedM3
        - annualCostSaved
        - status
    IndustryComparison:
      type: object
      properties:
        industry:
          type: string
        avgSavingsPct:
          type: number
        avgMonthlyUsageM3:
          type: number
        avgAnnualSavings:
          type: number
        customerCount:
          type: integer
        icon:
          type: string
          description: Emoji icon for the industry
      required:
        - industry
        - avgSavingsPct
        - avgMonthlyUsageM3
        - avgAnnualSavings
        - customerCount
        - icon
